server:
  servlet:
    context-path: /api/v1
  port: 9090
spring:
  application:
    name: azure-cloud-storage-acct-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
azure:
  storage:
    connection-string: ${STORAGE_CONNECTION_STRING}
    container-name: ${CONTAINER_NAME}
